<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guitar Distortion Visual Lab</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, sans-serif; background: #101215; color: #eef1f6; overflow: hidden; }

    /* ── outer grid: sidebar | canvas area ── */
    .wrap { display: grid; grid-template-columns: 300px 1fr; height: 100vh; }

    /* ── sidebar ── */
    .panel { padding: 14px; border-right: 1px solid #2b313a; background: #151922; overflow-y: auto; }
    .panel h2 { margin: 0 0 10px; font-size: 17px; }
    .panel h3 { margin: 14px 0 5px; font-size: 12px; color: #9cb6d8; text-transform: uppercase; letter-spacing: .04em; }
    .row { margin-bottom: 7px; }
    label { display: block; font-size: 11px; color: #cfd8e3; margin-bottom: 3px; }
    input, select, button { width: 100%; padding: 6px 8px; border: 1px solid #3c4657; border-radius: 5px; background: #1f2531; color: #edf2fb; font-size: 12px; }
    input[type="range"] { padding: 0; }
    .inline { display: grid; grid-template-columns: 1fr 64px; gap: 6px; align-items: center; }
    .inline input[type="number"] { width: 64px; }
    .btns { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 6px; }
    button { cursor: pointer; background: #274065; }
    button:hover { background: #345687; }
    .legend { font-size: 11px; color: #9eb1cc; margin-top: 8px; line-height: 1.6; }

    /* ── toggle switch ── */
    .switch-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 7px; }
    .switch-label { font-size: 11px; color: #cfd8e3; }
    .switch { position: relative; display: inline-block; width: 42px; height: 22px; flex: 0 0 auto; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .sw-track {
      position: absolute; cursor: pointer; inset: 0;
      background: #2f3a4c; border: 1px solid #3c4657;
      border-radius: 999px; transition: .2s;
    }
    .sw-track::before {
      content: ""; position: absolute;
      width: 16px; height: 16px; left: 2px; top: 2px;
      background: #dce8ff; border-radius: 50%; transition: .2s;
    }
    .switch input:checked + .sw-track { background: #345687; }
    .switch input:checked + .sw-track::before { transform: translateX(20px); }

    /* ── canvas stage ── */
    .stage {
      display: grid;
      grid-template-rows: 45% 55%;   /* time-row top, freq bottom */
      gap: 6px; padding: 6px;
      height: 100vh;
    }
    /* time row: main 2/3 | output 1/3 */
    .time-row {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 6px;
    }
    .card { position: relative; background: #0f131a; border: 1px solid #263040; border-radius: 8px; overflow: hidden; }
    .card h4 {
      position: absolute; margin: 0; top: 6px; left: 8px;
      font-size: 11px; color: #c8d4e8; z-index: 1;
      background: rgba(10,12,16,0.7); padding: 2px 6px; border-radius: 4px;
    }
    canvas { display: block; }   /* sized by JS via ResizeObserver */
  </style>
</head>
<body>
  <div class="wrap">
    <aside class="panel">
      <h2>🎸 Distortion Visual Lab</h2>

      <h3>输入源</h3>
      <div class="row">
        <label for="sourceType">Source Type</label>
        <select id="sourceType">
          <option value="sine">Sine Wave</option>
          <option value="guitar_chord">Guitar Chord (sample)</option>
          <option value="guitar_single">Guitar Single Pick (sample)</option>
        </select>
      </div>
      <div class="row inline">
        <div>
          <label for="sineFreq">Sine Freq (Hz)</label>
          <input id="sineFreq" type="range" min="80" max="1200" step="1" value="220" />
        </div>
        <input id="sineFreqNum" type="number" min="80" max="1200" step="1" value="220" />
      </div>
      <div class="row">
        <label for="inputFileChord">Guitar Chord Audio (optional file)</label>
        <input id="inputFileChord" type="file" accept="audio/*" />
      </div>
      <div class="row">
        <label for="inputFileSingle">Guitar Single Audio (optional file)</label>
        <input id="inputFileSingle" type="file" accept="audio/*" />
      </div>

      <h3>增益与失真</h3>
      <div class="row inline">
        <div>
          <label for="gainDb">Input Gain (dB)</label>
          <input id="gainDb" type="range" min="-6" max="20" step="0.1" value="6" />
        </div>
        <input id="gainDbNum" type="number" min="-6" max="20" step="0.1" value="6" />
      </div>
      <div class="switch-row">
        <span class="switch-label">Distortion On/Off</span>
        <label class="switch">
          <input id="distOn" type="checkbox" checked />
          <span class="sw-track"></span>
        </label>
      </div>
      <div class="row">
        <label for="algo">Algorithm</label>
        <select id="algo">
          <option value="hardclip">Hard Clip</option>
          <option value="softclip">Soft Clip (tanh)</option>
          <option value="distortion">Distortion (atan)</option>
          <option value="overdrive">Overdrive (soft knee)</option>
          <option value="mosfet">MOSFET-like asym soft/hard</option>
          <option value="fuzz">Fuzz</option>
          <option value="rectifier">Rectifier</option>
        </select>
      </div>
      <div class="row inline">
        <div>
          <label for="threshold">Clip Threshold</label>
          <input id="threshold" type="range" min="0.1" max="1.0" step="0.01" value="0.6" />
        </div>
        <input id="thresholdNum" type="number" min="0.1" max="1.0" step="0.01" value="0.6" />
      </div>
      <div class="row inline">
        <div>
          <label for="drive">Drive (algorithm intensity)</label>
          <input id="drive" type="range" min="0" max="20" step="0.1" value="8" />
        </div>
        <input id="driveNum" type="number" min="0" max="20" step="0.1" value="8" />
      </div>
      <div class="switch-row">
        <span class="switch-label">Asymmetric Clip（只削正半波）</span>
        <label class="switch">
          <input id="asymToggle" type="checkbox" />
          <span class="sw-track"></span>
        </label>
      </div>

      <h3>示波器视图</h3>
      <div class="row inline">
        <div>
          <label for="timeWindowMs">Time Window (ms)</label>
          <input id="timeWindowMs" type="range" min="5" max="200" step="1" value="40" />
        </div>
        <input id="timeWindowMsNum" type="number" min="5" max="200" step="1" value="40" />
      </div>
      <div class="row inline">
        <div>
          <label for="timeOffsetMs">Time Offset (ms)</label>
          <input id="timeOffsetMs" type="range" min="0" max="1900" step="1" value="0" />
        </div>
        <input id="timeOffsetMsNum" type="number" min="0" max="1900" step="1" value="0" />
      </div>
      <div class="switch-row">
        <span class="switch-label">Split View（输入/输出分层）</span>
        <label class="switch">
          <input id="splitView" type="checkbox" />
          <span class="sw-track"></span>
        </label>
      </div>

      <div class="btns">
        <button id="btnRender">Render</button>
        <button id="btnPlayIn">Play Input</button>
      </div>
      <div class="btns">
        <button id="btnPlayOut">Play Output</button>
        <button id="btnStop">Stop</button>
      </div>

      <div class="legend">
        颜色：<br>
        绿色 = 输入（含 Gain）<br>
        蓝色 = 输出（失真后）<br>
        虚线 = ±削波阈值（含 asymmetric）<br>
      </div>
    </aside>

    <main class="stage">
      <div class="time-row">
        <div class="card">
          <h4>时域：输入（绿）vs 输出（蓝）</h4>
          <canvas id="timeCanvas"></canvas>
        </div>
        <div class="card">
          <h4>输出波形</h4>
          <canvas id="timeOutCanvas"></canvas>
        </div>
      </div>
      <div class="card">
        <h4>频域：输入 vs 输出（FFT 幅频，0–5 kHz）</h4>
        <canvas id="freqCanvas"></canvas>
      </div>
    </main>
  </div>

  <script src="distortion-lab.js"></script>
</body>
</html>
